<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DLQ 관리</title>
</head>
<body>
<h1>DLQ 관리</h1>
<p><a href="/admin">대시보드로 돌아가기</a></p>
<p th:if="${message}" th:text="${message}"></p>
<table>
    <thead>
    <tr>
        <th>큐 이름</th>
        <th>메시지 수</th>
        <th>컨슈머 수</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="queue : ${queues}">
        <td th:text="${queue.queueName}"></td>
        <td th:text="${queue.messageCount}"></td>
        <td th:text="${queue.consumerCount}"></td>
        <td>
            <form th:action="@{/admin/dead-letter-queues/{queueName}/replay-jobs(queueName=${queue.queueName})}" method="post">
                <input name="count" type="number" min="1" placeholder="count" />
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">재처리</button>
            </form>
            <form th:action="@{/admin/dead-letter-queues/{queueName}/messages/purge(queueName=${queue.queueName})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">비우기</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
