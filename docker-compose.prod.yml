version: '3.8'

# Production compose — App(Spring) + Prometheus only
# Grafana: use Grafana Cloud (remote_write from Prometheus)
# Redis / RabbitMQ: separate infra server (docker-compose.infra.yml)
#
# Required .env on EC2 (EC2_DEPLOY_PATH/.env):
#   ECR_REGISTRY, ECR_REPOSITORY
#   INFRA_HOST, DB_HOST, DB_NAME
#   DB_USER, DB_PASSWORD
#   RABBITMQ_USER, RABBITMQ_PASSWORD

services:
  dsko:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    container_name: iamhere-server-container
    ports:
      - "8080:8080"
      - "127.0.0.1:4861:4861"
    volumes:
      - ./config:/app/config:ro
      - ./secrets/imhereFirebaseKey.json:/app/secrets/imhereFirebaseKey.json:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_REDIS_HOST=${INFRA_HOST}
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_RABBITMQ_HOST=${INFRA_HOST}
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_VIRTUAL_HOST=/main
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      # Firebase 키 경로 — ClassPathResource 대신 파일시스템 경로 사용
      - FIREBASE_PATH=file:/app/secrets/imhereFirebaseKey.json
      # OpenTelemetry → Grafana Cloud Tempo (OTel SDK 표준 env var)
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${GRAFANA_CLOUD_TEMPO_ENDPOINT}
      - OTEL_EXPORTER_OTLP_TRACES_HEADERS=Authorization=Basic ${GRAFANA_CLOUD_TEMPO_AUTH_BASE64}
      - OTEL_SERVICE_NAME=imhere
    networks:
      - app-network
    restart: unless-stopped

  # Grafana Alloy: Docker 컨테이너 stdout 로그 및 App 메트릭 수집 → Grafana Cloud
  alloy:
    image: grafana/alloy:latest
    container_name: alloy-container
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
    environment:
      - GRAFANA_CLOUD_LOKI_ENDPOINT=${GRAFANA_CLOUD_LOKI_ENDPOINT}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
      - GRAFANA_CLOUD_LOKI_API_KEY=${GRAFANA_CLOUD_LOKI_API_KEY}
      - GRAFANA_CLOUD_PROM_ENDPOINT=${GRAFANA_CLOUD_PROM_ENDPOINT}
      - GRAFANA_CLOUD_PROM_USER=${GRAFANA_CLOUD_PROM_USER}
      - GRAFANA_CLOUD_PROM_API_KEY=${GRAFANA_CLOUD_PROM_API_KEY}
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    ipam:
      driver: default
      config:
        - subnet: 10.50.0.0/16
